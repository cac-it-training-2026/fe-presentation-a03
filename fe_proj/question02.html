<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
			
			<!-- ▼追加：問題ヘッダー -->
   			<div class="question-header">
				   
				<!-- ▼追加：前の問題ボタン -->
        		<button class="nav-btn prev-btn">
            		← 前へ
        		</button>

        		<!-- ▼既存：問題文 -->
				<h3 class="quiz-question">
				問題2: DDoS攻撃の特徴はどれですか？
				</h3>
				
				<!-- ▼追加：次の問題ボタン -->
        		<button class="nav-btn next-btn">
        		    次へ →
        		</button>

    		</div>
    		
			<!-- ▼既存：選択肢 -->
	        <form class="quiz-options">
                <label>
                    <input type="radio" name="q1" value="1" /> 
                    1. 不正中継が可能なメールサーバを見つけた後、それを踏み台にチェーンメールを大量に送信する。
                </label>
                <label>
                    <input type="radio" name="q1" value="2" /> 
                    2. 特定のターゲットに対し、フィッシングメールを送信して不正サイトへ誘導する。
                </label>
                <label>
                    <input type="radio" name="q1" value="3" /> 
                    3. 特定のWebサイトに対し、日時を決めて、複数台のPCから同時に攻撃する。
                </label>
                <label>
                    <input type="radio" name="q1" value="4" /> 
                    4. セキュリティパッチが提供される前にパッチが対象とする脆弱性を攻撃する。
                </label>
            </form>

            <details class="quiz-answer">
				<!-- ▼修正①：全体をdetailsで折りたたみ化（解説の開閉UI） -->
                <summary>解答と解説を見る</summary>
                
                <!-- ▼修正②：正解と解説を分離して「ブロック化」 -->
                <!-- ■ 正解ブロック（赤枠で強調） -->
                <div class="answer-box correct-box">
					
                    <!-- ▼修正③：見出しを追加（構造を明確化） -->
        			<div class="answer-title">正解：</div>
        			
        			    <!-- ▼修正④：本文を分離（視認性向上） -->
        				<div class="answer-text">
            			3. 特定のWebサイトに対し、日時を決めて、複数台のPCから同時に攻撃する。
        				</div>
        				
                    </div>
                    
                    <!-- ■ 解説ブロック（青枠で強調） -->
    				<div class="answer-box explanation-box">
						
        				<!-- ▼修正⑤：見出し追加（正解と区別） -->
        				<div class="answer-title">解説：</div>
        				
        				    <!-- ▼修正⑥：長文を整理（読みやすさ改善） -->
        					<div class="answer-text">
                        
            				1. 不正中継が可能なメールサーバを見つけた後、それを踏み台にチェーンメールを大量に送信する。
            				<br>
            				→ スパムメール送信行為の特徴です。
            				<br><br>

            				2. 特定のターゲットに対し、フィッシングメールを送信して不正サイトへ誘導する。
            				<br>
            				→ フィッシングの特徴です。
							<br><br>

            				4. セキュリティパッチが提供される前に脆弱性を攻撃する。
            				<br>
            				→ ゼロデイ攻撃の特徴です。

        				</div>
                	</div>
            </details>
        </div>
    </body>
</html>
